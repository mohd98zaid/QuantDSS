services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantdb
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quantdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app

  # ── Signal Engine Worker (Sharded — Part 1) ─────────────────────────────
  # Three horizontally sharded workers, each processing 1/3 of symbols
  signal-engine-worker-0:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SIGNAL_WORKER_ID: "0"
      SIGNAL_WORKER_TOTAL: "3"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
    command: ["python", "-m", "app.workers.signal_engine_worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  signal-engine-worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SIGNAL_WORKER_ID: "1"
      SIGNAL_WORKER_TOTAL: "3"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
    command: ["python", "-m", "app.workers.signal_engine_worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  signal-engine-worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SIGNAL_WORKER_ID: "2"
      SIGNAL_WORKER_TOTAL: "3"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
    command: ["python", "-m", "app.workers.signal_engine_worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Risk Engine Worker ────────────────────────────────────────────────────
  risk-engine-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
    command: ["python", "-m", "app.workers.risk_engine_worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── AutoTrader Worker ─────────────────────────────────────────────────────
  autotrader-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
    command: ["python", "-m", "app.workers.autotrader_worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Trade Monitor Worker ──────────────────────────────────────────────────
  trade-monitor-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: ["python", "-m", "app.workers.trade_monitor_worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PEL Recovery Worker ───────────────────────────────────────────────────
  pel-recovery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: ["python", "-m", "app.workers.pel_recovery_worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Feature Extraction Worker (Part 6) ────────────────────────────────────
  feature-extraction-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
    command: ["python", "-m", "app.workers.feature_extraction_worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app

  # ── Scanner Worker (Phase 12) ─────────────────────────────────────────────
  scanner-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:${DB_PASSWORD}@postgres:5432/quantdb
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SCANNER_INTERVAL: "300"
      SCANNER_ACTIVE_LISTS: "nifty50"
    command: ["python", "-m", "app.workers.scanner_worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

  # ═══════════════════════════════════════════════════════════════════════════
  # Part 2 — Kafka Cluster
  # ═══════════════════════════════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    profiles:
      - kafka

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    profiles:
      - kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: quantdss
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    profiles:
      - kafka

  # ═══════════════════════════════════════════════════════════════════════════
  # Part 7 — Observability Stack
  # ═══════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-quantdss}
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

  node_exporter:
    image: prom/node-exporter:v1.7.0
    restart: unless-stopped
    ports:
      - "9100:9100"
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  prometheus_data:
  grafana_data:
