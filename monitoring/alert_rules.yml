groups:
  - name: quantdss_alerts
    rules:
      - alert: WorkerCrash
        expr: quantdss_worker_uptime_seconds < 60
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "QuantDSS Worker Restarted/Crashed: {{ $labels.worker_name }}"
          description: "Worker {{ $labels.worker_name }} has an uptime of less than 60 seconds."
          
      - alert: APIFailureRateHigh
        expr: rate(quantdss_trade_failures_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High API Error Rate for {{ $labels.symbol }}"
          description: "Trade execution failures are occurring at >0.05 per sec over 5m for {{ $labels.symbol }}."
          
      - alert: RedisStreamLag
        expr: quantdss_redis_stream_lag > 500
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High Redis Stream Lag on {{ $labels.stream_name }}"
          description: "Stream {{ $labels.stream_name }} has >500 pending messages (consumer group: {{ $labels.consumer_group }})."
          
      - alert: ExecutionLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(quantdss_execution_latency_seconds_bucket[5m])) by (le)) > 2.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Execution Latency"
          description: "95th percentile execution latency is >2.5s over the last 5 minutes."
