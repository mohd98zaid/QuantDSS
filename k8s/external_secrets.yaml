apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: quantdss
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: quantdss-sa

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: quantdss-credentials
  namespace: quantdss
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: quantdss-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: quantdss/prod/credentials
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: quantdss/prod/credentials
        property: REDIS_URL
    - secretKey: UPSTOX_API_KEY
      remoteRef:
        key: quantdss/prod/credentials
        property: UPSTOX_API_KEY
    - secretKey: UPSTOX_API_SECRET
      remoteRef:
        key: quantdss/prod/credentials
        property: UPSTOX_API_SECRET
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: quantdss/prod/credentials
        property: TELEGRAM_BOT_TOKEN
    - secretKey: SECRET_KEY
      remoteRef:
        key: quantdss/prod/credentials
        property: SECRET_KEY
