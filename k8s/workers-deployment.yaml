apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-engine-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: signal-engine-worker
  template:
    metadata:
      labels:
        app: signal-engine-worker
    spec:
      containers:
      - name: worker
        image: quantdss/worker:latest
        command: ["python", "-m", "app.workers.signal_engine_worker"]
        envFrom:
        - configMapRef:
            name: quantdss-config
        - secretRef:
            name: quantdss-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
---
